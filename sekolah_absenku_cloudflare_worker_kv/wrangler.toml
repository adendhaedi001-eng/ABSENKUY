name = "sekolah-absenku-kv"
compatibility_date = "2026-05-28"
pages_build_output_dir = "."

# Worker KV binding.
# Setelah membuat KV Namespace di Cloudflare, ganti id di bawah.
# Binding name utama wajib: SEKOLAH_ABSENKU_KV
[[kv_namespaces]]
binding = "SEKOLAH_ABSENKU_KV"
id = "GANTI_DENGAN_KV_NAMESPACE_ID_ANDA"
