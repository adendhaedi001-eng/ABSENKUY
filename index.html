<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sekolah Absenku - Login</title>
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <style>
    :root{
      --blue:#1d4ed8;--blue2:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#7c3aed;
      --text:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc;--card:#fff;--shadow:0 12px 36px rgba(15,23,42,.08);--radius:18px
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Segoe UI",sans-serif;background:linear-gradient(135deg,#eff6ff,#f8fafc 55%,#ecfdf5);color:var(--text)}
    button,input,select,textarea{font:inherit} button{border:0;cursor:pointer}.hidden{display:none!important}
    .login-page{min-height:100vh;display:grid;place-items:center;padding:20px}
    .login-wrap{width:min(980px,100%);display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .panel{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}
    .hero h1{font-size:36px;margin:8px 0}.hero p,.note{color:var(--muted);line-height:1.55}
    .badge{display:inline-flex;padding:7px 11px;border-radius:999px;background:#dbeafe;color:var(--blue);font-weight:800}
    .role-grid{display:grid;gap:10px;margin-top:18px}
    .role-card{display:flex;gap:12px;align-items:center;text-align:left;padding:14px;border-radius:18px;border:1px solid var(--line);background:#f8fafc}
    .role-card.active{border-color:#93c5fd;background:#eff6ff;box-shadow:0 0 0 4px #dbeafe}
    .role-ico{width:46px;height:46px;border-radius:16px;background:#fff;display:grid;place-items:center;font-size:24px}
    .field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800}
    .field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:14px;background:#fff;outline:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px #dbeafe}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;border-radius:14px;background:var(--blue);color:#fff;font-weight:800}
    .btn:hover{filter:brightness(.98)} .btn.block{width:100%}.btn.secondary{background:#fff;color:#334155;border:1px solid var(--line)}
    .btn.green{background:var(--green)} .btn.red{background:var(--red)} .btn.yellow{background:var(--yellow)} .btn.purple{background:var(--purple)} .btn.small{padding:8px 10px;font-size:13px;border-radius:11px}
    .toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center}.divider{height:1px;background:var(--line);margin:15px 0}
    .app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.sidebar{background:rgba(255,255,255,.9);border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--blue),#06b6d4);color:#fff;font-size:25px;font-weight:900;display:grid;place-items:center}.brand h2{font-size:18px;margin:0}.brand span{font-size:12px;color:var(--muted)}
    .nav{display:grid;gap:7px}.nav button{display:flex;align-items:center;gap:11px;text-align:left;background:transparent;color:#334155;border-radius:14px;padding:11px 12px}.nav button.active,.nav button:hover{background:#eaf2ff;color:var(--blue);font-weight:800}
    .content{padding:22px 24px 88px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.topbar h1{font-size:28px;margin:0}.topbar p{margin:5px 0 0;color:var(--muted)}
    .pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;color:#334155;box-shadow:0 6px 18px rgba(15,23,42,.04)}
    .grid{display:grid;gap:16px}.grid.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:var(--shadow)}
    .stat{display:flex;align-items:center;gap:13px}.stat .ico{width:46px;height:46px;border-radius:15px;background:#eff6ff;display:grid;place-items:center;font-size:22px}.stat b{font-size:26px;display:block}.stat span{font-size:13px;color:var(--muted)}
    .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}th{background:#f8fafc;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:.04em}tr:last-child td{border-bottom:0}
    .empty{text-align:center;border:1px dashed #cbd5e1;background:#f8fafc;border-radius:16px;padding:30px;color:var(--muted)}.empty b{display:block;color:#334155;margin-bottom:6px}
    .status-btns{display:flex;gap:7px;flex-wrap:wrap}.status-btns button{padding:8px 10px;border-radius:999px;background:#f1f5f9;color:#334155;font-weight:800}.status-btns button.active.Hadir{background:#22c55e;color:#fff}.status-btns button.active.Izin{background:#3b82f6;color:#fff}.status-btns button.active.Sakit{background:#f59e0b;color:#fff}.status-btns button.active.Alfa{background:#ef4444;color:#fff}.code-btn{min-width:42px;height:38px;border-radius:12px!important;font-size:16px!important}.code-btn.active{box-shadow:0 0 0 3px #dbeafe}.kode-h{background:#dcfce7!important;color:#166534!important}.kode-s{background:#fef3c7!important;color:#92400e!important}.kode-i{background:#dbeafe!important;color:#1d4ed8!important}.kode-a{background:#fee2e2!important;color:#991b1b!important}
    .label{display:inline-flex;padding:6px 10px;border-radius:999px;background:#f1f5f9;font-weight:800;font-size:12px}.label.Hadir{background:#dcfce7;color:#166534}.label.Izin{background:#dbeafe;color:#1d4ed8}.label.Sakit{background:#fef3c7;color:#92400e}.label.Alfa{background:#fee2e2;color:#991b1b}
    .score-input{width:54px!important;text-align:center;padding:7px 4px!important}.score-final{font-weight:900;color:var(--blue)}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0f172a;color:white;padding:12px 16px;border-radius:999px;display:none;z-index:80}.bottom-nav{display:none}.mobile-head{display:none}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{padding:10px 14px;border-radius:14px;background:#eef2ff;color:#334155}.tabs button.active{background:var(--blue);color:#fff;font-weight:800}
    .legend{display:flex;gap:8px;flex-wrap:wrap}.legend span{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:#fff}
    .center{text-align:center}.datecell{min-width:40px;text-align:center;padding:8px 6px}.sticky-left{position:sticky;left:0;background:#fff;z-index:1}.sticky-left-2{position:sticky;left:50px;background:#fff;z-index:1}.sticky-left-3{position:sticky;left:150px;background:#fff;z-index:1}
    .rekap th.sticky-left,.rekap th.sticky-left-2,.rekap th.sticky-left-3{background:#f8fafc;z-index:2}
    .danger{color:#dc2626}.share-box{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:14px;max-height:320px;overflow:auto;font-family:monospace;font-size:13px}

    .absen-table{min-width:640px}.student-name-cell b{display:block;font-size:14px}.student-name-cell small{display:block;margin-top:4px;color:var(--muted);font-size:12px}.attendance-pick{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.absen-circle{width:42px!important;height:42px!important;min-width:42px!important;border-radius:999px!important;padding:0!important;display:inline-grid!important;place-items:center!important;font-size:16px!important;font-weight:900!important;border:2px solid transparent!important}.absen-circle.active{border-color:#0f172a!important;box-shadow:0 0 0 4px #dbeafe!important;transform:scale(1.04)}.attendance-status-chip{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:5px 9px;font-weight:900;font-size:12px}.attendance-status-chip.Hadir{background:#dcfce7;color:#166534}.attendance-status-chip.Sakit{background:#fef3c7;color:#92400e}.attendance-status-chip.Izin{background:#dbeafe;color:#1d4ed8}.attendance-status-chip.Alfa{background:#fee2e2;color:#991b1b}
    @media(max-width:900px){.login-wrap{grid-template-columns:1fr}.app{display:block}.sidebar{display:none}.content{padding:14px 14px 86px}.topbar{display:none}.mobile-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.bottom-nav{display:flex;position:fixed;left:12px;right:12px;bottom:12px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:22px;padding:8px;z-index:40;overflow:auto}.bottom-nav button{min-width:88px;display:grid;gap:2px;background:transparent;border-radius:16px;padding:8px 8px;color:#64748b}.bottom-nav button.active{background:#eff6ff;color:var(--blue);font-weight:900}.grid.cards,.grid.two,.grid.three{grid-template-columns:1fr}.hero h1{font-size:30px}table{min-width:720px}}


    /* ===== Versi HP / Mobile First Fix ===== */
    @media (max-width: 768px){
      html{font-size:16px;-webkit-text-size-adjust:100%}
      body{background:#f8fafc;padding:0;overflow-x:hidden}
      input,select,textarea,button{font-size:16px!important}
      .login-page{min-height:100dvh;padding:14px;align-items:start;place-items:start stretch;background:linear-gradient(180deg,#eff6ff,#ffffff 48%,#ecfdf5)}
      .login-wrap{display:block;width:100%;max-width:100%;}
      .login-wrap .panel{margin-bottom:12px}
      .panel{border-radius:22px;padding:16px;box-shadow:0 8px 22px rgba(15,23,42,.07)}
      .hero h1{font-size:28px;line-height:1.1;margin:8px 0 6px}
      .hero p,.note{font-size:14px;line-height:1.5}
      .role-card{border-radius:18px;padding:12px}.role-ico{width:42px;height:42px;border-radius:14px}

      .app{display:block;min-height:100dvh;background:#f8fafc}
      .sidebar,.topbar{display:none!important}
      .content{padding:12px 12px 112px;max-width:100%;}
      .mobile-head{display:flex!important;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:30;background:rgba(248,250,252,.92);backdrop-filter:blur(12px);padding:8px 0 10px;margin-bottom:8px}
      .brand{margin:0;gap:9px}.brand h2{font-size:16px}.brand span{font-size:11px}.logo{width:42px;height:42px;border-radius:14px;font-size:22px}

      .grid,.grid.cards,.grid.two,.grid.three,.grid.four{display:grid!important;grid-template-columns:1fr!important;gap:12px!important}
      .card{border-radius:20px;padding:14px;margin-top:12px!important;box-shadow:0 8px 22px rgba(15,23,42,.06)}
      .card h3{font-size:17px;margin:0 0 10px}
      .stat{align-items:center}.stat .ico{width:42px;height:42px;border-radius:14px}.stat b{font-size:22px}
      .pill{padding:8px 11px;font-size:13px}

      .toolbar{display:grid!important;grid-template-columns:1fr!important;gap:9px!important;align-items:stretch!important;width:100%}
      .toolbar > *{width:100%!important;max-width:100%!important}
      .toolbar h3{margin-bottom:0!important}
      .btn{width:100%;min-height:46px;border-radius:15px;padding:11px 13px;white-space:normal;text-align:center}
      .btn.small{min-height:40px;padding:8px 10px}
      .field{margin-bottom:10px}.field label{font-size:11px}.field input,.field select,.field textarea{min-height:46px;border-radius:15px;padding:11px 12px}
      input[type="date"],input[type="month"],select{min-height:46px;background:#fff}

      .tabs{display:grid!important;grid-template-columns:1fr!important;gap:8px!important}.tabs button{width:100%;min-height:44px;border-radius:15px}
      .legend{display:grid!important;grid-template-columns:1fr 1fr;gap:8px}.legend span{justify-content:center;padding:8px;font-size:13px}

      .tablewrap{border-radius:16px;overflow:auto;-webkit-overflow-scrolling:touch;max-width:100%;}
      table{min-width:720px} th,td{padding:9px 8px;font-size:13px} th{font-size:11px}
      .score-input{width:50px!important;min-height:38px!important;padding:6px 4px!important;font-size:14px!important}
      .datecell{min-width:38px;padding:7px 5px}
      .sticky-left,.sticky-left-2,.sticky-left-3{position:static!important;background:inherit!important}
      .rekap th.sticky-left,.rekap th.sticky-left-2,.rekap th.sticky-left-3{position:static!important;background:#f8fafc!important}

      .status-btns{display:grid!important;grid-template-columns:1fr 1fr;gap:7px}.status-btns button{width:100%;border-radius:14px;padding:9px 8px}

      .absen-table{min-width:560px!important}.attendance-pick{gap:7px;justify-content:flex-start}.absen-circle{width:38px!important;height:38px!important;min-width:38px!important;font-size:15px!important}.student-name-cell small{font-size:11px}
      .label{font-size:11px;padding:5px 8px}
      .empty{border-radius:18px;padding:22px 14px;font-size:14px}
      .share-box{font-size:12px;max-height:260px;overflow:auto}

      .bottom-nav{display:flex!important;position:fixed;left:8px;right:8px;bottom:8px;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid var(--line);box-shadow:0 12px 36px rgba(15,23,42,.18);border-radius:22px;padding:7px;gap:6px;overflow-x:auto;scrollbar-width:none}
      .bottom-nav::-webkit-scrollbar{display:none}
      .bottom-nav button{min-width:76px;flex:0 0 auto;display:grid;place-items:center;gap:2px;background:transparent;border-radius:16px;padding:8px 6px;color:#64748b;font-size:11px;line-height:1.1;white-space:nowrap}
      .bottom-nav button b{font-size:19px}.bottom-nav button.active{background:#eff6ff;color:var(--blue);font-weight:900}
      .toast{left:10px;right:10px;bottom:92px;transform:none;border-radius:16px;text-align:center;padding:12px 14px}
    }

    @media (min-width: 769px){
      .mobile-head{display:none!important}
    }



    /* ===== Background Sekolah Absenku: Login dan Halaman Dalam ===== */
    body{
      background:
        radial-gradient(circle at 10% 10%, rgba(37,99,235,.18), transparent 28%),
        radial-gradient(circle at 90% 15%, rgba(34,197,94,.16), transparent 26%),
        radial-gradient(circle at 50% 95%, rgba(14,165,233,.16), transparent 30%),
        linear-gradient(135deg,#eff6ff 0%,#ffffff 48%,#ecfdf5 100%)!important;
      min-height:100vh;
    }
    .login-page{
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(rgba(255,255,255,.72),rgba(255,255,255,.78)),
        radial-gradient(circle at 18% 18%, rgba(29,78,216,.22), transparent 24%),
        radial-gradient(circle at 82% 22%, rgba(34,197,94,.20), transparent 25%),
        radial-gradient(circle at 70% 82%, rgba(124,58,237,.13), transparent 28%),
        linear-gradient(135deg,#dbeafe 0%,#ffffff 48%,#dcfce7 100%)!important;
    }
    .login-page::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(29,78,216,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,78,216,.07) 1px, transparent 1px);
      background-size:34px 34px;
      mask-image:linear-gradient(135deg,rgba(0,0,0,.68),rgba(0,0,0,.08));
      -webkit-mask-image:linear-gradient(135deg,rgba(0,0,0,.68),rgba(0,0,0,.08));
    }
    .login-page::after{
      content:"";
      position:absolute;
      right:-90px;
      bottom:-90px;
      width:310px;
      height:310px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,.95), transparent 26%),
        linear-gradient(135deg, rgba(29,78,216,.22), rgba(34,197,94,.20));
      filter:blur(.2px);
      pointer-events:none;
    }
    .login-wrap{position:relative;z-index:1}
    .login-page .panel{
      background:rgba(255,255,255,.88)!important;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .login-page .hero{
      background:
        linear-gradient(145deg,rgba(255,255,255,.93),rgba(239,246,255,.88)),
        radial-gradient(circle at 20% 20%,rgba(37,99,235,.14),transparent 35%)!important;
    }
    .app{
      position:relative;
      isolation:isolate;
      background:
        radial-gradient(circle at 18% 12%, rgba(37,99,235,.12), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(34,197,94,.12), transparent 25%),
        radial-gradient(circle at 80% 90%, rgba(6,182,212,.12), transparent 28%),
        linear-gradient(135deg,#f8fafc 0%,#eff6ff 45%,#ecfdf5 100%)!important;
    }
    .app::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(100,116,139,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,116,139,.06) 1px, transparent 1px);
      background-size:38px 38px;
    }
    .sidebar{
      background:rgba(255,255,255,.88)!important;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }
    .content{background:transparent!important}
    .card,.panel{
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .mobile-head{
      background:rgba(248,250,252,.88)!important;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(226,232,240,.65);
    }
    @media(max-width:768px){
      .login-page{
        background:
          linear-gradient(rgba(255,255,255,.72),rgba(255,255,255,.82)),
          radial-gradient(circle at 12% 10%, rgba(29,78,216,.22), transparent 30%),
          radial-gradient(circle at 92% 20%, rgba(34,197,94,.20), transparent 28%),
          linear-gradient(180deg,#dbeafe 0%,#ffffff 50%,#dcfce7 100%)!important;
      }
      .login-page::after{width:210px;height:210px;right:-70px;bottom:-70px}
      .app{
        background:
          radial-gradient(circle at 12% 8%, rgba(37,99,235,.12), transparent 30%),
          radial-gradient(circle at 94% 18%, rgba(34,197,94,.12), transparent 28%),
          linear-gradient(180deg,#f8fafc 0%,#eff6ff 52%,#ecfdf5 100%)!important;
      }
    }

    .app::before{

function normalizeRemoteData(saved){
  if(!saved||typeof saved!=='object')return emptyData();
  /* Jangan reset data online hanya karena versi aplikasi berubah. */
  if(!saved.appVersion)return emptyData();
  var base=emptyData();

function fetchCloudState(){
  return fetch('/api/state',{cache:'no-store'}).then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.json();});
}
function applyCloudState(payload){
  if(!payload||!payload.db)return;
  if(payload.updatedAt&&payload.updatedAt===cloudLastUpdatedAt)return;
  cloudLastUpdatedAt=payload.updatedAt||'';
  var localUser=db&&db.user?db.user:null;
  cloudApplying=true;
  db=normalizeRemoteData(payload.db);
  db.user=localUser;
  saveLocalOnly();
  try{render();}catch(e){console.error(e);}
  cloudApplying=false;
}
function pullCloudState(showToast){
  if(!CLOUD_ONLINE)return;
  fetchCloudState().then(function(payload){
    cloudStatus='online';
    if(payload&&payload.db)applyCloudState(payload);
    updateCloudBadge();
    if(showToast)toast('Data online Cloudflare berhasil dimuat');
  }).catch(function(err){
    cloudStatus='offline';
    updateCloudBadge();
    console.warn('Cloudflare sync pull gagal:',err);
    if(showToast)toast('Belum terhubung ke Cloudflare. Data sementara tersimpan di perangkat.');
  });
}
function pushCloudState(){
  if(!CLOUD_ONLINE||cloudApplying)return;
  var body={db:remoteCopy()};
  fetch('/api/state',{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.json();}).then(function(payload){
    cloudStatus='online';
    updateCloudBadge();
    cloudLastUpdatedAt=payload.updatedAt||cloudLastUpdatedAt;
  }).catch(function(err){
    cloudStatus='offline';
    updateCloudBadge();
    console.warn('Cloudflare sync push gagal:',err);
  });
}
function scheduleCloudSave(){
  clearTimeout(cloudSaveTimer);

function startCloudflareSync(){
  pullCloudState(true);

}

function compareStudentByName(a,b){

}
function compareStudentByNis(a,b){
  var aa=normalizeSortText(a.nis), bb=normalizeSortText(b.nis);

}

function login(){
  var u=el('username').value.trim();

  var passEl=el('password');
  var p=passEl?passEl.value:'';
  var ok=false;
  if(!key){toast('Username atau NIS/NISN wajib diisi');return;}

  if(key==='admin'){
    ok=(p===getAdminPassword());
    if(ok)db.user={role:'admin',username:key,name:'Admin Sekolah'};
  }else if(key==='guru'){
    ok=(p===getGuruPassword());
    if(ok)db.user={role:'guru',username:key,name:'Guru'};
  }else{
    var st=db.students.find(function(s){return String(s.nis||'').toLowerCase()===key;});
    ok=!!st;
    if(ok)db.user={role:'siswa',username:st.nis,name:st.name,studentId:st.id,classId:st.classId};
  }
  if(!ok){toast('Data login tidak sesuai');return;}
  page='home';save();render();toast('Login berhasil');
}

function addSchool(){var name=el('schoolName').value.trim();var teacherCount=Number(el('schoolTeachers').value||0);if(!name){toast('Nama sekolah wajib diisi');return;}var sid=id();db.schools.push({id:sid,name:name,teacherCount:teacherCount});for(var i=0;i<teacherCount;i++){if(!db.teachers)db.teachers=[];db.teachers.push({id:id(),name:'Guru '+(i+1),schoolId:sid});}log('Tambah sekolah');saveAndRender();}
function addTeacher(){var name=el('teacherName')?el('teacherName').value.trim():'';var sid=el('teacherSchool')?el('teacherSchool').value:'';if(!sid){toast('Pilih sekolah terlebih dahulu');return;}if(!name){toast('Nama guru wajib diisi');return;}if(!db.teachers)db.teachers=[];db.teachers.push({id:id(),name:name,schoolId:sid});syncTeacherCount(sid);log('Tambah guru');saveAndRender();}
function editTeacher(tid,k,v){var t=(db.teachers||[]).find(function(x){return x.id===tid;});if(!t)return;var oldSchool=t.schoolId;t[k]=v.trim?v.trim():v;if(k==='schoolId'){syncTeacherCount(oldSchool);syncTeacherCount(t.schoolId);}log('Edit guru');save();}
function delTeacher(tid){if(!confirm('Hapus guru?'))return;var t=(db.teachers||[]).find(function(x){return x.id===tid;});var oldSchool=t?t.schoolId:null;db.teachers=(db.teachers||[]).filter(function(x){return x.id!==tid;});if(oldSchool)syncTeacherCount(oldSchool);log('Hapus guru');saveAndRender();}
function editSchool(sid,name){var s=db.schools.find(function(x){return x.id===sid;});if(s){s.name=name.trim()||s.name;log('Edit sekolah');save();}}
function editSchoolTeacher(sid,val){var s=db.schools.find(function(x){return x.id===sid;});if(s){s.teacherCount=Math.max(0,Number(val||0));log('Edit jumlah guru');save();}}
function delSchool(sid){if(!confirm('Hapus sekolah? Guru, kelas, dan siswa terkait ikut terhapus.'))return;var cls=db.classes.filter(function(c){return c.schoolId===sid;}).map(function(c){return c.id;});db.schools=db.schools.filter(function(s){return s.id!==sid;});db.teachers=(db.teachers||[]).filter(function(t){return t.schoolId!==sid;});db.classes=db.classes.filter(function(c){return c.schoolId!==sid;});db.students=db.students.filter(function(s){return cls.indexOf(s.classId)<0;});db.attendance=db.attendance.filter(function(a){return cls.indexOf(a.classId)<0;});db.gradeSheets=db.gradeSheets.filter(function(g){return cls.indexOf(g.classId)<0;});log('Hapus sekolah');saveAndRender();}
window.addSelectedData=addSelectedData;window.addSchool=addSchool;window.addTeacher=addTeacher;window.editTeacher=editTeacher;window.delTeacher=delTeacher;window.editSchool=editSchool;window.editSchoolTeacher=editSchoolTeacher;window.delSchool=delSchool;

function addClass(){var sid=el('classSchool').value;var name=el('className').value.trim();if(!sid||!name){toast('Sekolah dan kelas wajib diisi');return;}db.classes.push({id:id(),schoolId:sid,name:name});log('Tambah kelas');saveAndRender();}

function studentView(){if(!isAdmin()){go('home');return;}var rows=studentsOf(filterClass).map(function(s,i){return '<tr><td>'+(i+1)+'</td><td><input value="'+safe(s.nis)+'" onchange="editStudent(\''+s.id+'\',\'nis\',this.value)"></td><td><input value="'+safe(s.name)+'" onchange="editStudent(\''+s.id+'\',\'name\',this.value)"></td><td><select onchange="editStudent(\''+s.id+'\',\'gender\',this.value)"><option '+(s.gender==='Laki-Laki'?'selected':'')+'>Laki-Laki</option><option '+(s.gender==='Perempuan'?'selected':'')+'>Perempuan</option></select></td><td>'+safe(className(s.classId))+'</td><td><button class="btn red small" onclick="delStudent(\''+s.id+'\')">Hapus</button></td></tr>';}).join('');var form=db.classes.length?'<div class="grid two"><div class="field"><label>NIS/NISN</label><input id="stuNis" placeholder="Nomor induk siswa"></div><div class="field"><label>Nama Siswa</label><input id="stuName" placeholder="Nama lengkap siswa"></div><div class="field"><label>Jenis Kelamin</label><select id="stuGender"><option>Laki-Laki</option><option>Perempuan</option></select></div><div class="field"><label>Kelas</label><select id="stuClass">'+optionsClasses('',false)+'</select></div></div><button class="btn" onclick="addStudent()">Tambah Siswa</button>':'<div class="empty"><b>Belum ada kelas</b></div>';var c='<div class="card"><h3>Tambah Siswa</h3>'+form+'</div><div class="card" style="margin-top:16px"><div class="toolbar"><h3 style="margin-right:auto">Data Siswa</h3><select onchange="filterClass=this.value;render()">'+optionsClasses(filterClass,true)+'</select></div>'+(rows?'<div class="tablewrap"><table><tr><th>No</th><th>NIS/NISN</th><th>Nama</th><th>JK</th><th>Kelas</th><th>Aksi</th></tr>'+rows+'</table></div>':'<div class="empty"><b>Belum ada siswa</b></div>')+'</div>';shell(c,'Siswa','Kelola data siswa.');}
function addStudent(){var nis=el('stuNis').value.trim();var name=el('stuName').value.trim();var gender=el('stuGender').value;var cid=el('stuClass').value;if(!nis||!name||!cid){toast('NIS/NISN, nama, dan kelas wajib diisi');return;}db.students.push({id:id(),nis:nis,name:name,gender:gender,classId:cid});log('Tambah siswa');saveAndRender();}
function editStudent(sid,k,v){var s=db.students.find(function(x){return x.id===sid;});if(s){s[k]=v.trim?v.trim():v;log('Edit siswa');save();}}

window.addStudent=addStudent;window.editStudent=editStudent;window.delStudent=delStudent;

function findAttendance(date,cid){return db.attendance.find(function(a){return a.date===date&&a.classId===cid;});}
function createAttendanceRecord(date,cid,createdBy){var studs=studentsOf(cid);if(!studs.length)return null;var a={id:id(),date:date,classId:cid,items:studs.map(function(s){return {studentId:s.id,status:'Hadir'};}),createdBy:createdBy||roleLabel(),lockedForGuru:false,sentToAdmin:false};db.attendance.unshift(a);return a;}
function attendanceCanEdit(a){if(!a)return false;if(isAdmin())return true;return !a.lockedForGuru||guruCanEditAttendance();}


function studentAttendanceView(){
  var st=currentStudent();
  if(!st)return '<div class="empty"><b>Data siswa tidak ditemukan</b>Silakan login ulang memakai NIS/NISN yang benar.</div>';
  var rows=[];
  db.attendance.forEach(function(a){
    var it=a.items.find(function(x){return x.studentId===st.id;});
    if(it)rows.push({date:a.date,classId:a.classId,status:it.status,code:statusCode(it.status),by:a.createdBy||'-'});
  });
  rows.sort(function(a,b){return b.date.localeCompare(a.date);});
  var html='<div class="card"><h3>Absensi Saya</h3><p class="note">Berikut riwayat absensi untuk <b>'+safe(st.name)+'</b>. Data ini hanya tampilan, tidak bisa diedit oleh siswa.</p></div>';
  if(!rows.length)return html+'<div class="empty"><b>Belum ada data absensi</b>Data akan muncul setelah Guru/Admin mengisi absensi.</div>';
  var tr=rows.map(function(r,i){return '<tr><td>'+(i+1)+'</td><td>'+safe(r.date)+'</td><td>'+safe(className(r.classId))+'</td><td class="center"><b>'+safe(r.code)+'</b></td><td><span class="label '+r.status+'">'+safe(r.status)+'</span></td><td>'+safe(r.by)+'</td></tr>';}).join('');
  return html+'<div class="card" style="margin-top:16px"><div class="tablewrap"><table><tr><th>No</th><th>Tanggal</th><th>Kelas</th><th>Kode</th><th>Keterangan</th><th>Diisi Oleh</th></tr>'+tr+'</table></div></div>';
}
function studentGradeView(){
  var st=currentStudent();
  if(!st)return '<div class="empty"><b>Data siswa tidak ditemukan</b>Silakan login ulang memakai NIS/NISN yang benar.</div>';
  var rows=[];
  db.gradeSheets.forEach(function(g){
    var vals=g.values&&g.values[st.id]?g.values[st.id]:{};
    var keys=Object.keys(vals).filter(function(k){return vals[k]!==''&&vals[k]!=null;}).sort(function(a,b){return Number(a)-Number(b);});
    keys.forEach(function(day){
      var date=g.month+'-'+String(day).padStart(2,'0');
      var val=vals[day];
      rows.push({date:date,type:g.type,classId:g.classId,val:val,ket:Number(val)>=75?'Tuntas':'Belum',by:g.createdBy||'-'});
    });
  });
  rows.sort(function(a,b){return b.date.localeCompare(a.date);});
  var html='<div class="card"><h3>Nilai Saya</h3><p class="note">Berikut nilai untuk <b>'+safe(st.name)+'</b>. Siswa hanya dapat melihat nilai miliknya sendiri.</p></div>';
  if(!rows.length)return html+'<div class="empty"><b>Belum ada data nilai</b>Data akan muncul setelah Guru/Admin mengisi nilai.</div>';
  var tr=rows.map(function(r,i){return '<tr><td>'+(i+1)+'</td><td>'+safe(r.date)+'</td><td>'+safe(typeLabel(r.type))+'</td><td>'+safe(className(r.classId))+'</td><td class="center"><b>'+safe(r.val)+'</b></td><td>'+safe(r.ket)+'</td><td>'+safe(r.by)+'</td></tr>';}).join('');
  return html+'<div class="card" style="margin-top:16px"><div class="tablewrap"><table><tr><th>No</th><th>Tanggal</th><th>Jenis</th><th>Kelas</th><th>Nilai</th><th>Keterangan</th><th>Diisi Oleh</th></tr>'+tr+'</table></div></div>';
}

function attendanceInputView(){
  if(!db.classes.length)return '<div class="empty"><b>Belum ada kelas</b>Buat kelas dan siswa terlebih dahulu.</div>';
  var content='';
  if(isAdmin()){
    var records=db.attendance.map(function(a,i){return '<tr><td>'+(i+1)+'</td><td>'+safe(a.date)+'</td><td>'+safe(className(a.classId))+'</td><td>'+a.items.length+' siswa</td><td>'+safe(a.createdBy||'-')+'</td><td>'+(a.sentToAdmin?'<span class="label Hadir">Tersimpan</span>':'<span class="label Sakit">Draft</span>')+'</td><td><button class="btn small" onclick="openAttendance(\''+a.id+'\')">Buka</button> <button class="btn red small" onclick="delAttendance(\''+a.id+'\')">Hapus</button></td></tr>';}).join('');
    content+='<div class="card"><h3>Buat / Buka Absensi</h3><div class="toolbar"><input type="date" id="attDate" value="'+today()+'"><select id="attClass">'+optionsClasses(selectedClassForInput,false)+'</select><button class="btn green" onclick="adminOpenOrCreateAttendance()">Buka / Isi Kehadiran Siswa</button></div></div>';
    content+='<div class="card" style="margin-top:16px"><h3>Daftar Absensi Tersimpan</h3>'+(records?'<div class="tablewrap"><table><tr><th>No</th><th>Tanggal</th><th>Kelas</th><th>Jumlah</th><th>Diisi Oleh</th><th>Status</th><th>Aksi</th></tr>'+records+'</table></div>':'<div class="empty"><b>Belum ada data absensi</b></div>')+'</div>';
  }else{

function isFocusableVisible(node){
  if(!node || node.disabled) return false;
  if(node.type==='hidden') return false;
  var style=window.getComputedStyle?window.getComputedStyle(node):null;
  if(style && (style.display==='none' || style.visibility==='hidden')) return false;
  return !!(node.offsetWidth || node.offsetHeight || (node.getClientRects&&node.getClientRects().length));
}
function focusAndSelect(node){
  if(!node) return false;
  try{node.focus({preventScroll:false});}catch(e){try{node.focus();}catch(_){}}
  if(node.select && (node.tagName==='INPUT' || node.tagName==='TEXTAREA')){
    try{node.select();}catch(e){}
  }
  return true;
}
function focusNextControl(current,scope){
  var root=scope || (current && current.closest && (current.closest('table') || current.closest('.card') || current.closest('main'))) || document;
  var selector='input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled]), button:not([disabled]), [tabindex]:not([tabindex="-1"])';
  var controls=Array.prototype.slice.call(root.querySelectorAll(selector)).filter(isFocusableVisible);
  var idx=controls.indexOf(current);
  if(idx<0 && document.activeElement) idx=controls.indexOf(document.activeElement);
  if(idx>=0 && idx<controls.length-1) return focusAndSelect(controls[idx+1]);
  return false;
}
function focusNextTableControl(current){
  var table=current && current.closest ? current.closest('table') : null;
  return focusNextControl(current, table || undefined);
}
function focusNextAttendanceControl(btn){
  var row=btn && btn.closest ? btn.closest('tr') : null;

  var next=row.nextElementSibling;
  while(next){
    var target=next.querySelector('.code-btn.active') || next.querySelector('.code-btn');
    if(target && isFocusableVisible(target)) return focusAndSelect(target);
    next=next.nextElementSibling;
  }
  return focusNextTableControl(btn);
}

function gradeSheetVisibleDays(g,editable){

function gradeSummaryForDays(sheet,sid,days){

}

function padRightText(v,len){
  v=String(v==null?'':v);
  if(v.length>len)return v.slice(0,Math.max(0,len-1))+'…';
  return v+Array(len-v.length+1).join(' ');
}
function padLeftText(v,len){
  v=String(v==null?'':v);
  if(v.length>len)return v.slice(0,len);
  return Array(len-v.length+1).join(' ')+v;
}
function cleanNameForShare(name){return String(name||'-').replace(/\s+/g,' ').trim();}
function maxNameWidth(students){
  var w=4;
  students.forEach(function(s){w=Math.max(w,cleanNameForShare(s.name).length);});
  return Math.min(Math.max(w,10),22);
}
function wrapShareText(titleLines,tableLines,footerLines){
  var lines=[];
  titleLines.forEach(function(x){lines.push(x);});
  lines.push('');
  lines.push('```');
  tableLines.forEach(function(x){lines.push(x);});
  lines.push('```');
  if(footerLines&&footerLines.length){lines.push('');footerLines.forEach(function(x){lines.push(x);});}
  return lines.join('\n');
}

function buildAttendanceShareText(cid,month){
  var students=studentsOf(cid);
  var days=daysInMonth(month);
  if(!students.length){return 'REKAP ABSEN SISWA\nKelas: '+className(cid)+'\nBulan: '+monthLabel(month)+'\n\nBelum ada siswa pada kelas ini.';}
  var nameW=maxNameWidth(students);
  var head='NO  '+padRightText('NAMA',nameW)+'  ';
  for(var d=1;d<=days;d++){head+=padLeftText(d,2)+' ';}
  head+=' H  S  I  A';
  var sep=Array(head.length+1).join('-');
  var table=[head,sep];
  students.forEach(function(s,idx){
    var counts={H:0,S:0,I:0,A:0};
    var row=padLeftText(idx+1,2)+'  '+padRightText(cleanNameForShare(s.name),nameW)+'  ';
    for(var d=1;d<=days;d++){
      var date=month+'-'+String(d).padStart(2,'0');
      var rec=findAttendance(date,cid);
      var code='-';
      if(rec){
        var item=rec.items.find(function(it){return it.studentId===s.id;});
        if(item){code=statusCode(item.status)||'-';if(counts[code]!=null)counts[code]++;}
      }
      row+=padLeftText(code,2)+' ';
    }
    row+=padLeftText(counts.H,2)+' '+padLeftText(counts.S,2)+' '+padLeftText(counts.I,2)+' '+padLeftText(counts.A,2);
    table.push(row);
  });
  return wrapShareText([
    'REKAP ABSEN SISWA',
    'Kelas : '+className(cid),
    'Bulan : '+monthLabel(month)
  ], table, ['Keterangan: H=Hadir, S=Sakit, I=Izin, A=Alfa']);
}
function buildGradeShareText(cid,month,type){

  var head='NO  '+padRightText('NAMA',nameW)+'  ';

  var sep=Array(head.length+1).join('-');
  var table=[head,sep];

function setShareContext(kind){
  shareKind=kind;
  if(!shareClass && db.classes[0])shareClass=db.classes[0].id;
  if(kind==='attendance'){
    shareClass=rekapClass||selectedClassForInput||shareClass||(db.classes[0]?db.classes[0].id:'');
    if(!rekapType)rekapType=isAdmin()?'bulanan':'harian';
    if(rekapType==='harian')shareDate=rekapDate||guruAttendanceDate||today();
    else if(rekapType==='custom'){
      if(!rekapStartDate)rekapStartDate=monthStart(rekapMonth||monthToday());
      if(!rekapEndDate)rekapEndDate=monthEnd(rekapMonth||monthToday());
    }else shareMonth=rekapMonth||monthToday();
  }else{
    shareClass=nilaiClass||shareClass||(db.classes[0]?db.classes[0].id:'');
    shareType=nilaiType||shareType||'harian';
    if(!nilaiRekapType)nilaiRekapType='bulanan';
    if(nilaiRekapType==='harian')shareDate=nilaiRekapDate||nilaiDate||today();
    else if(nilaiRekapType==='custom'){
      if(!nilaiRekapStartDate)nilaiRekapStartDate=monthStart(nilaiMonth||monthToday());
      if(!nilaiRekapEndDate)nilaiRekapEndDate=monthEnd(nilaiMonth||monthToday());
    }else shareMonth=nilaiMonth||monthToday();
  }
}
function buildShareText(){
  if(!shareClass)shareClass=db.classes[0]?db.classes[0].id:'';
  if(!shareMonth)shareMonth=monthToday();
  if(!shareDate)shareDate=today();
  if(shareKind==='attendance'){
    if(rekapType==='harian')return buildAttendanceDailyShareText(shareClass,shareDate||rekapDate||today());
    if(rekapType==='custom')return buildAttendanceRangeShareText(shareClass,rekapStartDate||today(),rekapEndDate||rekapStartDate||today());
    return buildAttendanceShareText(shareClass,shareMonth||rekapMonth||monthToday());
  }
  if(nilaiRekapType==='harian')return buildGradeDailyShareText(shareClass,shareDate||nilaiRekapDate||today(),shareType);
  if(nilaiRekapType==='custom')return buildGradeRangeShareText(shareClass,nilaiRekapStartDate||today(),nilaiRekapEndDate||nilaiRekapStartDate||today(),shareType);
  return buildGradeShareText(shareClass,shareMonth||nilaiMonth||monthToday(),shareType);
}

function fallbackCopyText(txt){
  var ta=document.createElement('textarea');
  ta.value=txt;

  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');toast('Teks berhasil disalin');}
  catch(e){toast('Tidak bisa menyalin otomatis. Gunakan tombol Lihat Preview lalu salin manual.');}
  ta.remove();
}

function wrapCanvasText(ctx,text,maxWidth){
  var words=String(text).split(' ');
  var lines=[];
  var line='';
  words.forEach(function(word){
    var test=line?line+' '+word:word;
    if(ctx.measureText(test).width>maxWidth && line){lines.push(line);line=word;}
    else line=test;
  });
  lines.push(line);
  return lines;
}

function drawTableJPG(data,filename){
  var canvas=document.createElement('canvas');
  var ctx=canvas.getContext('2d');
  var padding=28;
  var titleH=36;
  var subH=24;
  var noteH=22;
  var headH=34;
  var rowH=30;
  var totalW=data.widths.reduce(function(a,b){return a+b;},0);
  var totalH=padding+titleH+subH+subH+noteH+18+headH+(Math.max(1,data.rows.length)*rowH)+padding;
  canvas.width=totalW+padding*2;
  canvas.height=totalH;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#0f172a';
  ctx.textBaseline='middle';
  ctx.font='bold 24px Arial';
  ctx.fillText(data.title,padding,padding+titleH/2);
  ctx.font='16px Arial';
  ctx.fillText(data.subtitle1,padding,padding+titleH+subH/2);
  ctx.fillText(data.subtitle2,padding,padding+titleH+subH+subH/2);
  ctx.fillStyle='#475569';
  ctx.font='14px Arial';
  ctx.fillText(data.note,padding,padding+titleH+subH+subH+noteH/2);

  var startY=padding+titleH+subH+subH+noteH+18;
  var x=padding;
  ctx.strokeStyle='#cbd5e1';
  ctx.lineWidth=1;
  ctx.fillStyle='#eaf2ff';
  for(var i=0;i<data.headers.length;i++){
    var w=data.widths[i]||40;
    ctx.fillRect(x,startY,w,headH);
    ctx.strokeRect(x,startY,w,headH);
    ctx.fillStyle='#0f172a';
    ctx.font='bold 13px Arial';
    ctx.textAlign=(i<2?'left':'center');
    ctx.fillText(data.headers[i], i<2?x+8:x+w/2, startY+headH/2);
    ctx.fillStyle='#eaf2ff';
    x+=w;
  }

  for(var r=0;r<Math.max(1,data.rows.length);r++){
    var row=data.rows[r]||Array(data.headers.length).fill('');
    var y=startY+headH+r*rowH;
    x=padding;
    for(var c=0;c<data.headers.length;c++){
      var w2=data.widths[c]||40;
      ctx.fillStyle=(r%2===0?'#ffffff':'#f8fafc');
      ctx.fillRect(x,y,w2,rowH);
      ctx.strokeStyle='#e2e8f0';
      ctx.strokeRect(x,y,w2,rowH);
      var val=row[c]==null?'':String(row[c]);
      if(c>=2 && c<data.headers.length-4 && val==='H') ctx.fillStyle='#166534';
      else if(c>=2 && c<data.headers.length-4 && val==='S') ctx.fillStyle='#92400e';
      else if(c>=2 && c<data.headers.length-4 && val==='I') ctx.fillStyle='#1d4ed8';
      else if(c>=2 && c<data.headers.length-4 && val==='A') ctx.fillStyle='#991b1b';
      else ctx.fillStyle='#0f172a';
      ctx.font='13px Arial';
      ctx.textAlign=(c<2?'left':'center');
      ctx.fillText(val, c<2?x+8:x+w2/2, y+rowH/2);
      x+=w2;
    }
  }

  var a=document.createElement('a');
  a.href=canvas.toDataURL('image/jpeg',0.95);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  toast('JPG berhasil dibuat');
}

function printableExcelHtmlFromGrid(data,kind){
  var isAttendance=kind==='attendance';
  var tailCount=isAttendance?4:3;
  var dateCount=Math.max(0,data.headers.length-2-tailCount);
  var colgroup='<col class="col-no"><col class="col-name">';
  for(var i=0;i<dateCount;i++)colgroup+='<col class="col-date">';
  for(var j=0;j<tailCount;j++)colgroup+='<col class="col-sum">';
  var head='<tr>'+data.headers.map(function(h,i){return '<th class="'+(i<2?'head-left':'')+'">'+safe(h)+'</th>';}).join('')+'</tr>';
  var rows=data.rows.map(function(row,ridx){
    return '<tr>'+row.map(function(cell,cidx){
      var val=cell==null?'':String(cell);
      var cls='';
      if(isAttendance && cidx>=2 && cidx<2+dateCount){
        if(val==='H')cls=' code-h';
        else if(val==='S')cls=' code-s';
        else if(val==='I')cls=' code-i';
        else if(val==='A')cls=' code-a';
        else cls=' code-empty';
      }
      if(!isAttendance && cidx>=2 && cidx<2+dateCount && val!=='-' && val!=='')cls=' nilai-cell';
      return '<td class="'+(cidx<2?'cell-left':'cell-center')+cls+'">'+safe(val)+'</td>';
    }).join('')+'</tr>';
  }).join('');
  if(!data.rows.length){
    rows='<tr><td colspan="'+data.headers.length+'" class="empty-print">Belum ada data</td></tr>';
  }
  var style='@page{size:A4 landscape;margin:8mm}*{box-sizing:border-box}body{font-family:Arial,sans-serif;color:#0f172a;margin:0;background:#fff}.report-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:2px solid #1d4ed8;padding-bottom:7px;margin-bottom:8px}.report-title h1{font-size:18px;margin:0 0 4px}.report-title p{font-size:11px;margin:2px 0;color:#334155}.badge-print{border:1px solid #cbd5e1;border-radius:999px;padding:5px 8px;font-size:10px;color:#334155;white-space:nowrap}.note-print{font-size:10px;color:#475569;margin:6px 0 8px}.table-wrap{width:100%;overflow:visible}table.excel{border-collapse:collapse;width:100%;table-layout:fixed;font-size:8.2px}table.excel th{background:#dbeafe;color:#0f172a;border:1px solid #94a3b8;padding:4px 2px;text-align:center;font-weight:700}table.excel td{border:1px solid #cbd5e1;padding:3px 2px;text-align:center;height:18px}table.excel tbody tr:nth-child(even) td{background:#f8fafc}.col-no{width:7mm}.col-name{width:43mm}.col-date{width:auto}.col-sum{width:8mm}.head-left,.cell-left{text-align:left!important}.cell-left{padding-left:4px!important}.code-h{background:#dcfce7!important;color:#166534;font-weight:700}.code-s{background:#fef3c7!important;color:#92400e;font-weight:700}.code-i{background:#dbeafe!important;color:#1d4ed8;font-weight:700}.code-a{background:#fee2e2!important;color:#991b1b;font-weight:700}.nilai-cell{font-weight:700}.empty-print{text-align:center!important;padding:16px!important;color:#64748b}.footer-print{margin-top:8px;font-size:10px;color:#475569;display:flex;justify-content:space-between;gap:12px}.avoid-break{break-inside:avoid}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.no-print{display:none}}';
  return '<!doctype html><html><head><title>'+safe(data.title)+'</title><meta charset="UTF-8"><style>'+style+'</style></head><body><div class="report-title"><div><h1>'+safe(data.title)+'</h1><p>'+safe(data.subtitle1)+'</p><p>'+safe(data.subtitle2)+'</p></div><div class="badge-print">Format tabel seperti Excel</div></div><div class="note-print">'+safe(data.note)+'</div><div class="table-wrap"><table class="excel"><colgroup>'+colgroup+'</colgroup><thead>'+head+'</thead><tbody>'+rows+'</tbody></table></div><div class="footer-print"><span>Dicetak dari aplikasi Absensi Siswa</span><span>'+new Date().toLocaleString('id-ID')+'</span></div><script>window.onload=function(){setTimeout(function(){window.print();},350)}<\/script></body></html>';
}

  var blob=new Blob([html],{type:'text/html;charset=utf-8'});

function backupPayload(){
  var copy=JSON.parse(JSON.stringify(db));
  delete copy.user;
  copy.appVersion=APP_VERSION;
  return {
    app:'Sekolah Absenku',
    version:APP_VERSION,
    exportedAt:new Date().toISOString(),
    exportedAtText:new Date().toLocaleString('id-ID'),
    db:copy
  };
}
function backupFileName(){
  var d=new Date();
  var stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0');
  return 'backup-sekolah-absenku-'+stamp+'.json';
}
function downloadDataBackup(){
  if(!isAdmin()){toast('Hanya Admin yang bisa download backup');return;}
  var data=JSON.stringify(backupPayload(),null,2);
  var blob=new Blob([data],{type:'application/json;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=backupFileName();
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){URL.revokeObjectURL(url);},800);
  log('Admin download backup data');
  toast('Backup JSON berhasil diunduh');
}
window.downloadDataBackup=downloadDataBackup;
function prepareImportedDb(raw){
  var data=(raw&&raw.db&&typeof raw.db==='object')?raw.db:raw;
  if(!data||typeof data!=='object')throw new Error('Format backup tidak valid');
  var base=emptyData();
  for(var k in data){if(k!=='user')base[k]=data[k];}
  base.appVersion=APP_VERSION;
  if(!Array.isArray(base.schools))base.schools=[];
  if(!Array.isArray(base.teachers))base.teachers=[];
  if(!Array.isArray(base.classes))base.classes=[];
  if(!Array.isArray(base.students))base.students=[];
  if(!Array.isArray(base.attendance))base.attendance=[];
  if(!Array.isArray(base.gradeSheets))base.gradeSheets=[];
  if(!Array.isArray(base.complaints))base.complaints=[];
  if(!Array.isArray(base.logs))base.logs=[];
  if(!base.settings)base.settings={};
  if(typeof base.settings.guruEditAttendance!=='boolean')base.settings.guruEditAttendance=false;
  if(typeof base.settings.guruEditGrades!=='boolean')base.settings.guruEditGrades=false;
  if(!base.settings.adminPassword)base.settings.adminPassword='admin123';
  if(!base.settings.guruPassword)base.settings.guruPassword='guru123';
  return base;
}
function uploadDataBackup(){
  if(!isAdmin()){toast('Hanya Admin yang bisa upload backup');return;}
  var input=el('backupUploadFile');
  if(!input||!input.files||!input.files[0]){toast('Pilih file backup JSON terlebih dahulu');return;}
  if(!confirm('Upload backup akan mengganti data aplikasi saat ini. Lanjutkan?'))return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var parsed=JSON.parse(String(reader.result||''));
      var localUser=db.user;
      db=prepareImportedDb(parsed);
      db.user=localUser;
      log('Admin upload/restore data backup');
      saveAndRender();
      toast('Data backup berhasil diupload dan dipulihkan');
    }catch(err){
      toast('Upload gagal: '+(err&&err.message?err.message:'File tidak valid'));
    }
  };
  reader.onerror=function(){toast('File backup gagal dibaca');};
  reader.readAsText(file);
}
window.uploadDataBackup=uploadDataBackup;

function saveLoginPasswords(){
  if(!isAdmin()){toast('Hanya Admin yang dapat mengganti password');return;}
  if(!db.settings)db.settings={};
  var ap=el('newAdminPass')?el('newAdminPass').value.trim():'';
  var gp=el('newGuruPass')?el('newGuruPass').value.trim():'';
  if(!ap&&!gp){toast('Isi password baru yang ingin diganti');return;}
  if(ap){if(ap.length<4){toast('Password Admin minimal 4 karakter');return;}db.settings.adminPassword=ap;}
  if(gp){if(gp.length<4){toast('Password Guru minimal 4 karakter');return;}db.settings.guruPassword=gp;}
  log('Admin mengganti password login');
  saveAndRender();
  toast('Password berhasil disimpan');
}
window.saveLoginPasswords=saveLoginPasswords;
function saveGuruAccessSettings(){
  if(!db.settings)db.settings={};
  db.settings.guruEditAttendance=el('guruEditAttendance').value==='on';

window.saveGuruAccessSettings=saveGuruAccessSettings;


function detectAppVersionFromHtml(html){
  var m=String(html||'').match(/var\s+APP_VERSION\s*=\s*['\"]([^'\"]+)['\"]/);
  return m?m[1]:'';
}
function currentHtmlUrlForUpdateCheck(){
  var path=location.pathname||'/';
  if(path.slice(-1)==='/')path+='index.html';
  return path+(path.indexOf('?')>=0?'&':'?')+'update_check='+Date.now();
}
function showUpdateBanner(newVersion){
  var old=el('appUpdateBanner');
  if(old)old.remove();
  var div=document.createElement('div');
  div.id='appUpdateBanner';
  div.style.cssText='position:fixed;left:12px;right:12px;bottom:88px;z-index:9999;background:#0f172a;color:#fff;border-radius:18px;padding:14px;box-shadow:0 18px 50px rgba(15,23,42,.25);display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap';
  div.innerHTML='<div><b>Update aplikasi tersedia</b><br><span style="opacity:.85;font-size:13px">Versi baru: '+safe(newVersion)+' · Versi saat ini: '+safe(APP_VERSION)+'</span></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn green small" onclick="reloadToNewVersion()">Update Sekarang</button><button class="btn secondary small" onclick="closeUpdateBanner()">Nanti</button></div>';
  document.body.appendChild(div);
}
function closeUpdateBanner(){var b=el('appUpdateBanner');if(b)b.remove();}
window.closeUpdateBanner=closeUpdateBanner;
function checkCloudflareAppUpdate(showToast){
  if(location.protocol==='file:'){
    if(showToast)toast('Cek update aktif setelah HTML dibuka dari Cloudflare, bukan dari file lokal.');
    return;
  }
  fetch(currentHtmlUrlForUpdateCheck(),{cache:'no-store'}).then(function(res){
    if(!res.ok)throw new Error('HTTP '+res.status);
    return res.text();
  }).then(function(html){
    var newVersion=detectAppVersionFromHtml(html);
    if(!newVersion){if(showToast)toast('Versi online tidak terbaca');return;}
    if(newVersion!==APP_VERSION){
      showUpdateBanner(newVersion);
      if(showToast)toast('Update aplikasi tersedia');
    }else{
      closeUpdateBanner();
      if(showToast)toast('Aplikasi sudah versi terbaru');
    }
  }).catch(function(err){
    console.warn('Cek update gagal:',err);
    if(showToast)toast('Belum bisa cek update Cloudflare');
  });
}
window.checkCloudflareAppUpdate=checkCloudflareAppUpdate;
function reloadToNewVersion(){
  var goReload=function(){
    var path=location.pathname||'/';
    var url=path+(path.indexOf('?')>=0?'&':'?')+'updated='+Date.now();
    location.href=url;
  };
  if(window.caches&&caches.keys){
    caches.keys().then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k);}));}).then(goReload).catch(goReload);
  }else{
    goReload();
  }
}
window.reloadToNewVersion=reloadToNewVersion;
function startAppUpdateChecker(){
  if(location.protocol==='file:')return;
  setTimeout(function(){checkCloudflareAppUpdate(false);},2500);
  setInterval(function(){checkCloudflareAppUpdate(false);},300000);
  window.addEventListener('focus',function(){checkCloudflareAppUpdate(false);});
  window.addEventListener('online',function(){checkCloudflareAppUpdate(false);});
}

try{render();startCloudflareSync();startAppUpdateChecker();}catch(e){el('root').innerHTML='<div class="login-page"><div class="panel"><h1>Aplikasi gagal dimuat</h1><p class="note">Error: '+safe(e.message)+'</p><button class="btn" onclick="localStorage.removeItem(\''+KEY+'\');location.reload()">Reset & Muat Ulang</button></div></div>';}
})();
